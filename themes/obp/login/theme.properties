# OBP Login Theme Properties
#
# Keycloak reads theme.properties PER THEME TYPE — i.e. it loads this
# <theme>/login/theme.properties file. The top-level <theme>/theme.properties is
# NOT consulted, so parent/styles/locales/CSS classes must be declared here (an
# earlier version wrongly assumed they were inherited from ../theme.properties).
parent=base
styles=css/styles.css
locales=en,de,fr,es,it,pt,ja,zh-CN

# Provider version — single source of truth is <version> in pom.xml
projectVersion=@project.version@

# Internationalization
internationalizationEnabled=true
supportedLocales=en,de,fr,es,it,pt,ja,zh-CN

# Branding assets
logo=img/obp_logo.png
favicon=img/favicon.png

# CSS Properties - Keycloak CSS Classes
kcHtmlClass=login-pf
kcBodyClass=
kcLoginClass=
kcFormCardClass=
kcFormHeaderClass=
kcHeaderClass=
kcHeaderWrapperClass=
kcFormClass=
kcFormGroupClass=pf-c-form__group
kcFormGroupErrorClass=pf-c-form__group pf-m-error
kcLabelClass=pf-c-form__label-text
kcInputClass=pf-c-form-control
kcInputErrorClass=pf-c-form-control pf-m-error
kcInputGroupClass=pf-c-input-group
kcFormPasswordVisibilityButtonClass=pf-c-button pf-m-control
kcFormPasswordVisibilityIconShow=fas fa-eye
kcFormPasswordVisibilityIconHide=fas fa-eye-slash
kcButtonClass=pf-c-button
kcButtonPrimaryClass=pf-m-primary
kcButtonSecondaryClass=pf-m-secondary
kcButtonDefaultClass=pf-m-secondary
kcButtonLinkClass=pf-m-link
kcButtonBlockClass=pf-m-block
kcButtonLargeClass=pf-m-lg
kcAlertClass=pf-c-alert
kcSignUpClass=
kcInfoAreaWrapperClass=

# Form styling
kcFormOptionsClass=
kcFormOptionsWrapperClass=
kcFormSettingClass=
kcFormSocialAccountSectionClass=
kcFormSocialAccountListClass=
kcFormSocialAccountListButtonClass=pf-c-button pf-m-secondary kc-social-provider-button
kcFormSocialAccountListGridClass=
kcFormSocialAccountGridItem=
kcFormSocialAccountNameClass=
kcCommonLogoIdP=

# Alert/Message styling
kcFeedbackSuccessIcon=fas fa-check-circle
kcFeedbackWarningIcon=fas fa-exclamation-triangle
kcFeedbackErrorIcon=fas fa-times-circle
kcFeedbackInfoIcon=fas fa-info-circle
kcAlertTitleClass=

# Theme metadata
name=OBP Keycloak Theme
displayName=Open Bank Project
version=1.0.0
author=Open Bank Project / TESOBE GmbH

# Custom "Forgot Password?" link URL (overrides Keycloak's default reset credentials page)
# Set via FORGOT_PASSWORD_URL environment variable at runtime, or edit directly here.
# Leave empty to use Keycloak's built-in password reset flow.
forgotPasswordUrl=

# OBP Auth User Provider name, displayed on the login page.
# Set via OBP_AUTHUSER_PROVIDER environment variable at runtime.
obpAuthUserProvider=
